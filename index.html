<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vandrex Candy Clicker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #2a2a3a;
    --accent: #ff6b35;
    --accent2: #ffcc00;
    --text: #e0e0f0;
    --muted: #666680;
    --success: #00ff88;
    --candy: #ff4488;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  #topbar {
    background: var(--panel);
    border-bottom: 2px solid var(--accent);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  #topbar h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  #candy-count {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    color: var(--accent2);
    text-align: center;
  }

  #candy-count span {
    font-size: 12px;
    color: var(--muted);
    display: block;
  }

  #cps-display {
    font-size: 13px;
    color: var(--success);
    text-align: right;
  }

  /* MAIN LAYOUT */
  #game {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT - CLICK ZONE */
  #click-zone {
    flex: 0 0 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a0a1a 0%, var(--bg) 70%);
    border-right: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  #click-zone::before {
    content: '';
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,68,136,0.05) 0%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  #candy-btn {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ff88cc, #ff2266, #cc0044);
    border: 4px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: transform 0.05s;
    box-shadow: 0 0 40px rgba(255,68,136,0.4), 0 0 80px rgba(255,68,136,0.2);
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 70px;
    user-select: none;
    -webkit-user-select: none;
  }

  #candy-btn:active {
    transform: scale(0.93);
    box-shadow: 0 0 20px rgba(255,68,136,0.6);
  }

  #candy-btn:hover {
    box-shadow: 0 0 60px rgba(255,68,136,0.6), 0 0 120px rgba(255,68,136,0.3);
  }

  #click-label {
    margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #click-power {
    margin-top: 6px;
    font-size: 13px;
    color: var(--candy);
  }

  /* FLOATING CLICK NUMBERS */
  .click-float {
    position: fixed;
    pointer-events: none;
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
    text-shadow: 0 0 10px rgba(255,204,0,0.8);
    animation: floatUp 1s ease-out forwards;
    z-index: 9999;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.6); }
  }

  /* GOLDEN CANDY */
  #golden-candy {
    position: absolute;
    font-size: 40px;
    cursor: pointer;
    animation: goldenFloat 3s ease-in-out infinite, goldenGlow 1s ease-in-out infinite alternate;
    z-index: 10;
    display: none;
    filter: drop-shadow(0 0 10px gold);
  }

  @keyframes goldenFloat {
    0%, 100% { transform: translateY(0) rotate(-10deg); }
    50% { transform: translateY(-15px) rotate(10deg); }
  }

  @keyframes goldenGlow {
    from { filter: drop-shadow(0 0 5px gold); }
    to { filter: drop-shadow(0 0 20px gold) drop-shadow(0 0 40px orange); }
  }

  /* MIDDLE - UPGRADES */
  #upgrades-panel {
    flex: 0 0 180px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 10px;
  }

  #upgrades-panel h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .upgrade-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0.4;
    pointer-events: none;
  }

  .upgrade-item.available {
    opacity: 1;
    pointer-events: all;
    border-color: var(--accent2);
    box-shadow: 0 0 8px rgba(255,204,0,0.2);
  }

  .upgrade-item.available:hover {
    background: rgba(255,204,0,0.1);
    transform: translateX(2px);
  }

  .upgrade-item.bought {
    opacity: 0.3;
    pointer-events: none;
    border-color: var(--success);
  }

  .upgrade-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent2);
  }

  .upgrade-desc {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .upgrade-cost {
    font-size: 11px;
    color: var(--candy);
    margin-top: 3px;
  }

  /* RIGHT - SHOP */
  #shop {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: var(--bg);
  }

  #shop h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
  }

  .building-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .building-item:hover:not(.locked) {
    border-color: var(--accent);
    background: rgba(255,107,53,0.1);
    transform: translateX(3px);
  }

  .building-item.locked {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .building-item.affordable {
    border-color: var(--accent2);
    box-shadow: 0 0 10px rgba(255,204,0,0.15);
  }

  .building-icon {
    font-size: 28px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }

  .building-info {
    flex: 1;
  }

  .building-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .building-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .building-cps {
    font-size: 11px;
    color: var(--success);
    margin-top: 1px;
  }

  .building-right {
    text-align: right;
    flex-shrink: 0;
  }

  .building-cost {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    color: var(--accent2);
  }

  .building-owned {
    font-size: 22px;
    font-weight: 900;
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* NOTIFICATION */
  #notification {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    box-shadow: 0 0 20px rgba(255,204,0,0.3);
  }

  /* ADMIN PANEL */
  #admin-panel {
    position: fixed;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    background: #0d0d15;
    border: 2px solid var(--accent);
    border-left: none;
    border-radius: 0 12px 12px 0;
    z-index: 9998;
    width: 180px;
    transition: transform 0.3s;
    display: none;
  }

  #admin-panel.minimised {
    transform: translateY(-50%) translateX(-155px);
  }

  #admin-header {
    background: var(--accent);
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 0 10px 0 0;
  }

  #admin-header span {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    color: #000;
    font-weight: 900;
    letter-spacing: 1px;
  }

  #admin-toggle {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: #000;
    font-weight: 900;
    line-height: 1;
  }

  #admin-body {
    padding: 10px;
  }

  .cheat-btn {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 5px;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cheat-btn:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .cheat-btn .icon { font-size: 14px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>⚡ VANDREX</h1>
  <div id="candy-count">
    <div id="count-display">0 candies</div>
    <span id="total-display">Total: 0 baked</span>
  </div>
  <div id="cps-display">0 per second</div>
</div>

<!-- NOTIFICATION -->
<div id="notification"></div>

<!-- GAME -->
<div id="game">

  <!-- CLICK ZONE -->
  <div id="click-zone">
    <div id="golden-candy" onclick="goldenClick()">🍬</div>
    <button id="candy-btn" onclick="clickCandy(event)">🍭</button>
    <div id="click-label">Click to make candy</div>
    <div id="click-power">+<span id="click-val">1</span> per click</div>
  </div>

  <!-- UPGRADES -->
  <div id="upgrades-panel">
    <h3>🔬 Upgrades</h3>
    <div id="upgrades-list"></div>
  </div>

  <!-- SHOP -->
  <div id="shop">
    <h3>🏪 Buildings</h3>
    <div id="buildings-list"></div>
  </div>

</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div id="admin-header">
    <span>⚡ ADMIN CHEATS</span>
    <button id="admin-toggle" onclick="toggleAdmin()">◀</button>
  </div>
  <div id="admin-body">
    <button class="cheat-btn" onclick="cheat('maxcandies')"><span class="icon">🍬</span>Max Candies</button>
    <button class="cheat-btn" onclick="cheat('unlockbuildings')"><span class="icon">🏗️</span>All Buildings x100</button>
    <button class="cheat-btn" onclick="cheat('unlockupgrades')"><span class="icon">🔬</span>All Upgrades</button>
    <button class="cheat-btn" onclick="cheat('autoclick')"><span class="icon">🖱️</span>Auto Click</button>
    <button class="cheat-btn" onclick="cheat('goldenspam')"><span class="icon">✨</span>Golden Spam</button>
    <button class="cheat-btn" onclick="cheat('maxcps')"><span class="icon">⚡</span>Max CPS</button>
    <button class="cheat-btn" onclick="cheat('reset')" style="border-color:#ff4444;color:#ff4444;"><span class="icon">🔄</span>Reset Game</button>
  </div>
</div>

<script>
// ============ GAME STATE ============
let candies = 0;
let totalCandies = 0;
let cps = 0;
let clickPower = 1;
let autoClickInterval = null;
let goldenInterval = null;
let goldenSpamInterval = null;
let adminMinimised = false;

const buildings = [
  { id:'cursor',    name:'Cursor',              icon:'🖱️',  baseCost:15,           baseCps:0.1,    desc:'Autoclicks the candy for you.',           owned:0 },
  { id:'lollipop',  name:'Lollipop Stand',      icon:'🍭',  baseCost:50,           baseCps:0.3,    desc:'A small stand selling lollipops.',         owned:0 },
  { id:'grandma',   name:'Grandma',             icon:'👵',  baseCost:100,          baseCps:0.5,    desc:'A nice grandma who bakes candies.',        owned:0 },
  { id:'farm',      name:'Candy Farm',           icon:'🌾',  baseCost:500,          baseCps:2,      desc:'Grows candies from sugarcane.',            owned:0 },
  { id:'mine',      name:'Sugar Mine',           icon:'⛏️',  baseCost:1000,         baseCps:5,      desc:'Mines deep sugar deposits.',               owned:0 },
  { id:'factory',   name:'Candy Factory',        icon:'🏭',  baseCost:5000,         baseCps:15,     desc:'Mass produces candies 24/7.',              owned:0 },
  { id:'bank',      name:'Chocolate Bank',       icon:'🏦',  baseCost:15000,        baseCps:40,     desc:'Generates candy interest.',                owned:0 },
  { id:'temple',    name:'Candy Temple',         icon:'🛕',  baseCost:50000,        baseCps:100,    desc:'Worshippers offer candies.',               owned:0 },
  { id:'wizard',    name:'Wizard Tower',         icon:'🧙',  baseCost:150000,       baseCps:250,    desc:'Summons candies from thin air.',           owned:0 },
  { id:'ship',      name:'Shipment',             icon:'🚀',  baseCost:500000,       baseCps:500,    desc:'Imports candies from outer space.',        owned:0 },
  { id:'alchemy',   name:'Alchemy Lab',          icon:'⚗️',  baseCost:1500000,      baseCps:1000,   desc:'Turns gold into candy.',                  owned:0 },
  { id:'portal',    name:'Portal',               icon:'🌀',  baseCost:5000000,      baseCps:2500,   desc:'Connects to a candy dimension.',           owned:0 },
  { id:'time',      name:'Time Machine',         icon:'⏰',  baseCost:15000000,     baseCps:5000,   desc:'Borrows candies from the future.',         owned:0 },
  { id:'antimatter',name:'Antimatter Condenser', icon:'⚛️',  baseCost:50000000,     baseCps:12000,  desc:'Converts matter into candy.',              owned:0 },
  { id:'prism',     name:'Prism',                icon:'🔮',  baseCost:150000000,    baseCps:25000,  desc:'Turns light into candy.',                  owned:0 },
  { id:'chance',    name:'Chancemaker',          icon:'🎲',  baseCost:500000000,    baseCps:50000,  desc:'Bends probability to make candy.',         owned:0 },
  { id:'fractal',   name:'Fractal Engine',       icon:'🌐',  baseCost:1500000000,   baseCps:100000, desc:'Harnesses infinite candy loops.',          owned:0 },
  { id:'js',        name:'Javascript Console',   icon:'💻',  baseCost:5000000000,   baseCps:250000, desc:'Codes candies into existence.',            owned:0 },
  { id:'idle',      name:'Idleverse',            icon:'🌌',  baseCost:15000000000,  baseCps:500000, desc:'A whole universe of candy.',               owned:0 },
  { id:'cortex',    name:'Cortex Baker',         icon:'🧠',  baseCost:50000000000,  baseCps:1000000,desc:'An AI that dreams of candy.',              owned:0 },
];

const upgrades = [
  { id:'u1',  name:'Sugar Gloves',         desc:'Double your click power',              cost:100,        req:()=>totalCandies>=50,         effect:()=>{ clickPower*=2; } },
  { id:'u2',  name:'Grandma\'s Recipe',    desc:'Grandmas produce 2x more',             cost:500,        req:()=>getOwned('grandma')>=1,   effect:()=>{ boostBuilding('grandma',2); } },
  { id:'u3',  name:'Industrial Lollipops', desc:'Lollipop stands produce 2x more',      cost:1000,       req:()=>getOwned('lollipop')>=5,  effect:()=>{ boostBuilding('lollipop',2); } },
  { id:'u4',  name:'Sugar Rush',           desc:'All CPS doubled',                      cost:5000,       req:()=>totalCandies>=1000,       effect:()=>{ cpsMultiplier*=2; recalcCps(); } },
  { id:'u5',  name:'Reinforced Cursors',   desc:'Cursors produce 4x more',              cost:10000,      req:()=>getOwned('cursor')>=10,   effect:()=>{ boostBuilding('cursor',4); } },
  { id:'u6',  name:'Farm Irrigation',      desc:'Candy farms produce 2x more',          cost:50000,      req:()=>getOwned('farm')>=5,      effect:()=>{ boostBuilding('farm',2); } },
  { id:'u7',  name:'Power Gloves',         desc:'10x your click power',                 cost:100000,     req:()=>totalCandies>=50000,      effect:()=>{ clickPower*=10; } },
  { id:'u8',  name:'Golden Candy Magnet',  desc:'Golden candies appear more often',      cost:500000,     req:()=>totalCandies>=100000,     effect:()=>{ goldenBonus=true; } },
  { id:'u9',  name:'Factory Overdrive',    desc:'Factories produce 3x more',            cost:1000000,    req:()=>getOwned('factory')>=10,  effect:()=>{ boostBuilding('factory',3); } },
  { id:'u10', name:'Quantum Sugar',        desc:'All CPS tripled',                      cost:5000000,    req:()=>totalCandies>=1000000,    effect:()=>{ cpsMultiplier*=3; recalcCps(); } },
  { id:'u11', name:'Dark Matter Candy',    desc:'Antimatter produces 5x more',          cost:50000000,   req:()=>getOwned('antimatter')>=5,effect:()=>{ boostBuilding('antimatter',5); } },
  { id:'u12', name:'Wizard Apprentice',    desc:'Wizard towers produce 3x more',        cost:10000000,   req:()=>getOwned('wizard')>=5,    effect:()=>{ boostBuilding('wizard',3); } },
  { id:'u13', name:'Hyperspace Shipping',  desc:'Shipments produce 5x more',            cost:100000000,  req:()=>getOwned('ship')>=10,     effect:()=>{ boostBuilding('ship',5); } },
  { id:'u14', name:'Philosopher\'s Stone', desc:'Alchemy labs produce 10x more',        cost:500000000,  req:()=>getOwned('alchemy')>=10,  effect:()=>{ boostBuilding('alchemy',10); } },
  { id:'u15', name:'Candy Multiverse',     desc:'All CPS multiplied by 5',              cost:1000000000, req:()=>totalCandies>=100000000,  effect:()=>{ cpsMultiplier*=5; recalcCps(); } },
  { id:'u16', name:'Temporal Paradox',     desc:'Time machines produce 10x more',       cost:5000000000, req:()=>getOwned('time')>=10,     effect:()=>{ boostBuilding('time',10); } },
  { id:'u17', name:'Rainbow Prism',        desc:'Prisms produce 10x more',              cost:10000000000,req:()=>getOwned('prism')>=10,    effect:()=>{ boostBuilding('prism',10); } },
  { id:'u18', name:'God Mode Clicking',    desc:'100x your click power',                cost:50000000000,req:()=>totalCandies>=10000000000,effect:()=>{ clickPower*=100; } },
  { id:'u19', name:'Infinite Loop',        desc:'Fractal engines produce 20x more',     cost:100000000000,req:()=>getOwned('fractal')>=10, effect:()=>{ boostBuilding('fractal',20); } },
  { id:'u20', name:'Candy God',            desc:'All production multiplied by 10',      cost:500000000000,req:()=>totalCandies>=100000000000,effect:()=>{ cpsMultiplier*=10; recalcCps(); } },
];

let boughtUpgrades = {};
let buildingMultipliers = {};
let cpsMultiplier = 1;
let goldenBonus = false;

buildings.forEach(b => buildingMultipliers[b.id] = 1);

function getOwned(id) {
  return buildings.find(b=>b.id===id)?.owned || 0;
}

function boostBuilding(id, mult) {
  buildingMultipliers[id] = (buildingMultipliers[id]||1) * mult;
  recalcCps();
}

function recalcCps() {
  cps = 0;
  buildings.forEach(b => {
    cps += b.owned * b.baseCps * (buildingMultipliers[b.id]||1);
  });
  cps *= cpsMultiplier;
}

function getBuildingCost(b) {
  return Math.ceil(b.baseCost * Math.pow(1.15, b.owned));
}

function formatNum(n) {
  if (n >= 1e15) return (n/1e15).toFixed(2) + ' quadrillion';
  if (n >= 1e12) return (n/1e12).toFixed(2) + ' trillion';
  if (n >= 1e9)  return (n/1e9).toFixed(2) + ' billion';
  if (n >= 1e6)  return (n/1e6).toFixed(2) + ' million';
  if (n >= 1e3)  return (n/1e3).toFixed(1) + 'K';
  return Math.floor(n).toString();
}

// ============ RENDER ============
function renderBuildings() {
  const list = document.getElementById('buildings-list');
  list.innerHTML = '';
  buildings.forEach((b,i) => {
    const cost = getBuildingCost(b);
    const locked = i > 0 && buildings[i-1].owned === 0 && b.owned === 0;
    const affordable = candies >= cost && !locked;
    const div = document.createElement('div');
    div.className = 'building-item' + (locked?' locked':'') + (affordable?' affordable':'');
    div.title = b.desc;
    div.innerHTML = `
      <div class="building-icon">${b.icon}</div>
      <div class="building-info">
        <div class="building-name">${b.name}</div>
        <div class="building-desc">${b.desc}</div>
        <div class="building-cps">+${formatNum(b.baseCps * (buildingMultipliers[b.id]||1))} CPS each</div>
      </div>
      <div class="building-right">
        <div class="building-cost">${formatNum(cost)}</div>
        <div class="building-owned">${b.owned}</div>
      </div>
    `;
    if (!locked) div.onclick = () => buyBuilding(i);
    list.appendChild(div);
  });
}

function renderUpgrades() {
  const list = document.getElementById('upgrades-list');
  list.innerHTML = '';
  upgrades.forEach(u => {
    if (boughtUpgrades[u.id]) return;
    const available = u.req() && candies >= u.cost;
    const show = u.req() || totalCandies >= u.cost * 0.1;
    if (!show) return;
    const div = document.createElement('div');
    div.className = 'upgrade-item' + (available?' available':'') + (boughtUpgrades[u.id]?' bought':'');
    div.innerHTML = `
      <div class="upgrade-name">${u.name}</div>
      <div class="upgrade-desc">${u.desc}</div>
      <div class="upgrade-cost">🍬 ${formatNum(u.cost)}</div>
    `;
    if (available) div.onclick = () => buyUpgrade(u);
    list.appendChild(div);
  });
}

function updateDisplay() {
  document.getElementById('count-display').textContent = formatNum(candies) + ' candies';
  document.getElementById('total-display').textContent = 'Total: ' + formatNum(totalCandies) + ' baked';
  document.getElementById('cps-display').textContent = formatNum(cps) + ' per second';
  document.getElementById('click-val').textContent = formatNum(clickPower);
}

// ============ ACTIONS ============
function clickCandy(e) {
  const earned = clickPower;
  candies += earned;
  totalCandies += earned;

  // Float number
  const el = document.createElement('div');
  el.className = 'click-float';
  el.textContent = '+' + formatNum(earned);
  el.style.left = (e.clientX - 20) + 'px';
  el.style.top = (e.clientY - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);

  updateDisplay();
  renderUpgrades();
}

function buyBuilding(i) {
  const b = buildings[i];
  const cost = getBuildingCost(b);
  if (candies < cost) return;
  candies -= cost;
  b.owned++;
  recalcCps();
  notify('🏗️ Bought ' + b.name + '!');
  renderBuildings();
  renderUpgrades();
  updateDisplay();
  save();
}

function buyUpgrade(u) {
  if (candies < u.cost || boughtUpgrades[u.id]) return;
  candies -= u.cost;
  boughtUpgrades[u.id] = true;
  u.effect();
  notify('🔬 Unlocked: ' + u.name + '!');
  renderBuildings();
  renderUpgrades();
  updateDisplay();
  save();
}

// ============ GOLDEN CANDY ============
function spawnGolden() {
  const gc = document.getElementById('golden-candy');
  const zone = document.getElementById('click-zone');
  const rect = zone.getBoundingClientRect();
  gc.style.left = (20 + Math.random() * (rect.width - 80)) + 'px';
  gc.style.top = (20 + Math.random() * (rect.height - 80)) + 'px';
  gc.style.display = 'block';
  setTimeout(() => { gc.style.display = 'none'; }, 13000);
}

function goldenClick() {
  const bonus = Math.max(candies * 0.1, cps * 60, clickPower * 100);
  candies += bonus;
  totalCandies += bonus;
  document.getElementById('golden-candy').style.display = 'none';
  notify('✨ Golden Candy! +' + formatNum(bonus) + ' candies!');
  updateDisplay();
  save();
}

function startGoldenTimer() {
  if (goldenInterval) clearInterval(goldenInterval);
  const interval = goldenBonus ? 20000 : 45000;
  goldenInterval = setInterval(spawnGolden, interval + Math.random() * 30000);
}

// ============ NOTIFY ============
function notify(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

// ============ SAVE / LOAD ============
function save() {
  const data = {
    candies, totalCandies, clickPower, cpsMultiplier,
    boughtUpgrades, buildingMultipliers,
    buildings: buildings.map(b => ({ id:b.id, owned:b.owned }))
  };
  localStorage.setItem('vandrex_candy', JSON.stringify(data));
}

function load() {
  try {
    const raw = localStorage.getItem('vandrex_candy');
    if (!raw) return;
    const data = JSON.parse(raw);
    candies = data.candies || 0;
    totalCandies = data.totalCandies || 0;
    clickPower = data.clickPower || 1;
    cpsMultiplier = data.cpsMultiplier || 1;
    boughtUpgrades = data.boughtUpgrades || {};
    buildingMultipliers = data.buildingMultipliers || {};
    if (data.buildings) {
      data.buildings.forEach(saved => {
        const b = buildings.find(x => x.id === saved.id);
        if (b) b.owned = saved.owned || 0;
      });
    }
    // Re-apply bought upgrade effects silently
    upgrades.forEach(u => {
      if (boughtUpgrades[u.id]) u.effect();
    });
    recalcCps();
  } catch(e) { console.log('Save load error:', e); }
}

// ============ ADMIN ============
function toggleAdmin() {
  adminMinimised = !adminMinimised;
  const panel = document.getElementById('admin-panel');
  const btn = document.getElementById('admin-toggle');
  panel.classList.toggle('minimised', adminMinimised);
  btn.textContent = adminMinimised ? '▶' : '◀';
}

function showAdminIfNeeded() {
  try {
    const user = JSON.parse(localStorage.getItem('vandrex_user') || '{}');
    if (user.email === 'aaron.mordey@outlook.com') {
      document.getElementById('admin-panel').style.display = 'block';
    }
  } catch(e) {}
}

function cheat(type) {
  switch(type) {
    case 'maxcandies':
      candies = 999999999999999;
      totalCandies = Math.max(totalCandies, candies);
      notify('🍬 Max candies applied!');
      break;
    case 'unlockbuildings':
      buildings.forEach(b => { b.owned = 100; });
      recalcCps();
      notify('🏗️ All buildings set to 100!');
      break;
    case 'unlockupgrades':
      upgrades.forEach(u => {
        if (!boughtUpgrades[u.id]) { boughtUpgrades[u.id] = true; u.effect(); }
      });
      recalcCps();
      notify('🔬 All upgrades unlocked!');
      break;
    case 'autoclick':
      if (autoClickInterval) {
        clearInterval(autoClickInterval);
        autoClickInterval = null;
        notify('🖱️ Auto click OFF');
      } else {
        autoClickInterval = setInterval(() => {
          candies += clickPower * 1000;
          totalCandies += clickPower * 1000;
        }, 100);
        notify('🖱️ Auto click ON — 1000/sec!');
      }
      break;
    case 'goldenspam':
      if (goldenSpamInterval) {
        clearInterval(goldenSpamInterval);
        goldenSpamInterval = null;
        notify('✨ Golden spam OFF');
      } else {
        goldenSpamInterval = setInterval(spawnGolden, 3000);
        notify('✨ Golden candy spam ON!');
      }
      break;
    case 'maxcps':
      cps = 9999999;
      notify('⚡ Max CPS applied!');
      break;
    case 'reset':
      if (confirm('Reset all progress? This cannot be undone!')) {
        localStorage.removeItem('vandrex_candy');
        location.reload();
      }
      break;
  }
  renderBuildings();
  renderUpgrades();
  updateDisplay();
  save();
}

// ============ GAME LOOP ============
function gameLoop() {
  if (cps > 0) {
    const earned = cps / 20;
    candies += earned;
    totalCandies += earned;
  }
  updateDisplay();
}

// ============ CHEAT LISTENER ============
function checkCheats() {
  const cheats = [
    'maxcandies', 'unlockbuildings', 'unlockupgrades',
    'autoclick', 'goldenspam', 'maxcps', 'reset'
  ];
  cheats.forEach(key => {
    const val = localStorage.getItem('vandrex_candy_cheat_' + key);
    if (val === 'true') {
      localStorage.removeItem('vandrex_candy_cheat_' + key);
      cheat(key);
    }
  });
}

// ============ INIT ============
load();
renderBuildings();
renderUpgrades();
updateDisplay();
showAdminIfNeeded();
startGoldenTimer();

setInterval(gameLoop, 50);
setInterval(save, 30000);
setInterval(() => { renderBuildings(); renderUpgrades(); }, 500);
setInterval(checkCheats, 500);
</script>
</body>
